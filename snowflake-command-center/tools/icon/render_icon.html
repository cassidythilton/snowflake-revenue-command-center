<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  #tile {
    width: 256px;
    height: 256px;
    border-radius: 58px;
    position: relative;
    overflow: hidden;
    /* steel-slate blue family sampled from the baseline "Domo for Snowflake" icon */
    background: linear-gradient(180deg, #3F72A0 0%, #35628B 55%, #2B4A6E 100%);
  }
  /* soft top sheen for depth */
  #tile::before {
    content: "";
    position: absolute;
    left: -20%; right: -20%; top: -60%;
    height: 120%;
    background: radial-gradient(ellipse at 50% 100%, rgba(255,255,255,0.16), rgba(255,255,255,0) 60%);
  }
  /* subtle inner bottom shadow */
  #tile::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -40%;
    height: 80%;
    background: radial-gradient(ellipse at 50% 0%, rgba(6,18,33,0.28), rgba(6,18,33,0) 62%);
  }
  #mark {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #mark svg {
    width: 150px;
    height: auto;
    filter: drop-shadow(0 3px 5px rgba(8,20,36,0.28));
  }
</style>
</head>
